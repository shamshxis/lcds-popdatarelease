name: Update Global Population Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Runs daily at 06:00 UTC

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found"
            exit 1
          fi

      - name: Ensure data folder exists
        run: |
          mkdir -p data

      - name: Run Intelligent Profiler & Scraper
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: |
          if [ -f scraper.py ]; then
            python scraper.py
          else
            echo "scraper.py not found"
            exit 1
          fi

      - name: Commit updated intelligence files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git add . || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update holistic intelligence data"
            git pull origin main --rebase
            git push
          fi
