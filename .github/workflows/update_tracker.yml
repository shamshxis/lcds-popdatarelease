name: Update Global Population Watch

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Show output files
        run: |
          ls -R data || true
          python - <<'PY'
from pathlib import Path
for p in Path('data').glob('*.csv'):
    print('\n---', p, '---')
    print(p.read_text(encoding='utf-8')[:800])
PY

      - name: Commit updates
        run: |
          git config --global user.name "global-pop-watch"
          git config --global user.email "actions@github.com"
          git add data/ .github/workflows/update_tracker.yml scraper.py app.py watchlist.yml requirements.txt
          git commit -m "Update tracker data" || echo "No changes to commit"
          git push
