name: Update Global Population Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found"
            exit 1
          fi

      - name: Ensure data folder exists
        run: |
          mkdir -p data

      - name: Run scraper
        run: |
          if [ -f scraper.py ]; then
            python scraper.py
          else
            echo "scraper.py not found"
            exit 1
          fi

      - name: Show generated files
        run: |
          echo "Contents of data folder:"
          ls -la data || true
          echo "CSV preview:"
          for f in data/*.csv; do
            echo "---- $f ----"
            head -n 20 "$f" || true
          done

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git add . || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update tracker data"
          git push
