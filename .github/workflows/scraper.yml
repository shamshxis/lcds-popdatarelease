name: Global PopData Scraper

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allows manual run button in GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for committing data back

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/releases.json
          # Only commit if data changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Release Calendar Data" && git push)
