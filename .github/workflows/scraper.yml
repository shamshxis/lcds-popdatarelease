- name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Stash any local changes (the new data) so we can pull safely
          git add data/releases.json data/releases.csv
          git stash
          
          # 2. Pull the very latest code from the repo to avoid conflicts
          git pull --rebase origin main
          
          # 3. Apply our new data back on top
          git stash pop
          
          # 4. Add, Commit, and Push
          git add data/releases.json data/releases.csv
          
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Release Calendar Data" && git push)
