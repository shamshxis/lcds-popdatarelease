name: Global PopData Scraper

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  # Allows you to manually trigger it from the "Actions" tab for testing
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Allows the bot to commit changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- CRITICAL FIX: Install Chrome System-Wide ---
      - name: Setup Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Stash changes
          git add data/releases.json data/releases.csv data/sources_health.json || true
          git stash
          
          # 2. Pull latest changes
          git pull --rebase origin main
          
          # 3. Apply our new data back on top
          git stash pop || echo "No stash found or conflict ignored"
          
          # 4. Add files again
          git add data/releases.json data/releases.csv data/sources_health.json || true
          
          # 5. Commit and Push
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Population Data Release Calendar [skip ci]"
            git push
          fi
