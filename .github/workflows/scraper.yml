name: Watchtower Auto-Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install -r requirements.txt

      - name: Run Watchtower Engine
        run: python scraper.py

      - name: Commit Changes
        run: |
          git config --global user.name "Watchtower Bot"
          git config --global user.email "bot@lcds.org"
          git add data/change_log.csv data/current_state.json
          git commit -m "📡 Auto-Sync: Detected new data events" || echo "No changes to commit"
          git push
