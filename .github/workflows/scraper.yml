name: Watchtower Auto-Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual click-to-run

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Precision Scraper
        run: python scraper.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Watchtower Bot"
          git config --global user.email "bot@lcds.org"
          
          # Force add the specific file we care about
          git add data/releases.json
          
          # Commit if there are changes, otherwise skip without error
          git commit -m "📡 Auto-Sync: Updated release schedule" || echo "No changes to commit"
          git push
