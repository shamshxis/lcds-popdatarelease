settings:
  user_agent: "Mozilla/5.0 (ResearchBot/LCDS-Enterprise)"
  timeout: 15

sources:
  # --- API DRIVEN (Fast & Reliable) ---
  - name: "ONS Release Calendar"
    country: "UK"
    url: "https://www.ons.gov.uk/releasecalendar/data?view=upcoming&size=50"
    parser: "ons_json_api"
    priority: "High"

  - name: "Eurostat Release Calendar"
    country: "EU"
    url: "https://ec.europa.eu/eurostat/cache/RELEASE_CALENDAR/calendar_en.xml"
    parser: "eurostat_xml"
    priority: "High"

  # --- RSS FEEDS (News & Alerts) ---
  - name: "DHS Program News"
    country: "Global"
    url: "https://dhsprogram.com/rss/news.cfm"
    parser: "rss_feed"
    priority: "Medium"

  - name: "FinData News"
    country: "Finland"
    url: "https://findata.fi/en/feed/"
    parser: "rss_feed"
    priority: "Medium"

  - name: "Retraction Watch"
    country: "Global"
    url: "https://retractionwatch.com/feed/"
    parser: "rss_feed"
    priority: "Low"

  # --- HTML SCRAPERS (Deep Scan) ---
  - name: "CBS Netherlands Calendar"
    country: "Netherlands"
    url: "https://www.cbs.nl/en-gb/publication-calendar"
    parser: "html_deep_scan" # CBS table is robust enough for deep scan
    priority: "Medium"

  - name: "Statistics Denmark Scheduled"
    country: "Denmark"
    url: "https://www.dst.dk/en/Statistik/planlagte"
    parser: "html_deep_scan"
    priority: "Medium"

  - name: "Statistics Norway Upcoming"
    country: "Norway"
    url: "https://www.ssb.no/en/kommende-publiseringer"
    parser: "html_deep_scan"
    priority: "Medium"

  - name: "Statistics Sweden Calendar"
    country: "Sweden"
    url: "https://www.scb.se/en/finding-statistics/publishing-calendar/"
    parser: "html_deep_scan"
    priority: "Medium"

  - name: "US Census Upcoming"
    country: "USA"
    url: "https://www.census.gov/data/what-is-data-census-gov/upcoming-releases.html"
    parser: "html_deep_scan"
    priority: "Medium"

  - name: "Human Mortality Database"
    country: "Global"
    url: "https://www.mortality.org/News/Events"
    parser: "html_deep_scan"
    priority: "High"
