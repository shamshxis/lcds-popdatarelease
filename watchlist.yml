settings:
  user_agent: "Mozilla/5.0 (ResearchBot/LCDS-ExecutiveWatch)"
  timeout: 20
  max_workers: 10
  page_workers: 4

sources:
  - name: "ONS Upcoming Releases"
    group: "UK"
    source_type: "Official"
    url: "https://www.ons.gov.uk/releasecalendar?release-type=type-upcoming"
    fallback_urls:
      - "https://www.ons.gov.uk/releasecalendar"
      - "https://www.ons.gov.uk/releasecalendar?release-type=type-cancelled"
    parser: "ons_release_calendar"
    keywords_any:
      - population
      - census
      - migration
      - fertility
      - birth
      - death
      - mortality
      - household
      - life expectancy
      - demographic
      - asylum
      - refugee
      - labour
      - family
      - marriage
      - divorce
      - health survey
      - admin-based population
    exclude_keywords:
      - producer price
      - gdp
      - trade
      - manufacturing
    track_missing_as_deleted: true
    priority_weight: 20

  - name: "US Census Releases"
    group: "USA"
    source_type: "Official"
    url: "https://www.census.gov/data/what-is-data-census-gov/upcoming-releases.html"
    fallback_urls:
      - "https://www.census.gov/data/what-is-data-census-gov/latest-releases/2025.html"
      - "https://www.census.gov/newsroom/tip-sheets/2025/tp25-05.html"
      - "https://www.census.gov/newsroom/tip-sheets/2025/tp25-06.html"
    parser: "census_upcoming"
    keywords_any:
      - current population survey
      - population
      - census
      - migration
      - household
      - microdata
      - american community survey
      - demographic
      - fertility
      - mortality
    priority_weight: 16

  - name: "CBS Netherlands Publication Calendar"
    group: "Netherlands"
    source_type: "Official"
    url: "https://www.cbs.nl/en-gb/publication-calendar"
    fallback_urls:
      - "https://www.cbs.nl/en-gb/about-us/we-produce-and-disseminate-statistics/publication-policy"
    parser: "cbs_calendar"
    keywords_any:
      - population
      - migration
      - asylum
      - births
      - death
      - mortality
      - household
      - labour market
      - demographics
      - housing
    priority_weight: 12

  - name: "Eurostat Release Calendar"
    group: "EU"
    source_type: "Official"
    url: "https://ec.europa.eu/eurostat/cache/RELEASE_CALENDAR/calendar_EN.ics"
    fallback_urls:
      - "https://ec.europa.eu/eurostat/cache/RELEASE_CALENDAR/calendar_en.xml"
      - "https://ec.europa.eu/eurostat/en/web/products-eurostat-news/w/wdn-20250102-1"
    parser: "ics_calendar"
    keywords_any:
      - population
      - demography
      - migration
      - asylum
      - fertility
      - mortality
      - household
      - labour
      - census
    priority_weight: 18

  - name: "Statistics Norway Upcoming Releases"
    group: "Norway"
    source_type: "Official"
    url: "https://www.ssb.no/en/kommende-publiseringer"
    fallback_urls:
      - "https://www.ssb.no/en/kommende-publiseringer/"
      - "https://www.ssb.no/en/statbank1"
    parser: "generic_calendar"
    keywords_any:
      - population
      - migration
      - births
      - deaths
      - fertility
      - household
      - asylum
      - mortality
      - labour force
    priority_weight: 10

  - name: "Statistics Sweden Publishing Calendar"
    group: "Sweden"
    source_type: "Official"
    url: "https://www.scb.se/en/finding-statistics/publishing-calendar/"
    fallback_urls:
      - "https://www.scb.se/en/About-us/official-statistics-of-sweden/government-agencies-responsible-for-official-statistics/statistikansvariga-myndigheter-med-annan-publiceringstidpunkt-an-8.00"
      - "https://www.scb.se/en/About-us/news-and-press-releases/press-contacts/"
    parser: "generic_calendar"
    keywords_any:
      - population
      - migration
      - asylum
      - births
      - deaths
      - fertility
      - household
      - mortality
      - demographic
    priority_weight: 10

  - name: "Statistics Denmark Releases"
    group: "Denmark"
    source_type: "Official"
    url: "https://www.dst.dk/en/presse"
    fallback_urls:
      - "https://www.dst.dk/en/presse/danmarks-statistiks-pressepolitik"
    parser: "html_signal_scan"
    keywords_any:
      - population
      - migration
      - immigrants
      - fertility
      - death
      - mortality
      - household
      - labour
      - release
      - publication
    priority_weight: 8

  - name: "Statistics Finland Releases"
    group: "Finland"
    source_type: "Official"
    url: "https://stat.fi/en/news/Schedule-for-statistical-releases-in-2026-has-been-published"
    fallback_urls:
      - "https://stat.fi/org/periaatteet/index_en.html/publication-principles-for-statistics"
      - "https://stat.fi/til/index_en.html"
    parser: "html_signal_scan"
    keywords_any:
      - population
      - migration
      - births
      - deaths
      - fertility
      - household
      - mortality
      - release calendar
      - discontinued
      - changes in statistics
    priority_weight: 10

  - name: "UN Population Division News"
    group: "UN"
    source_type: "Signal"
    url: "https://www.un.org/development/desa/pd/feed"
    parser: "rss"
    keywords_any:
      - population
      - demographic
      - migration
      - fertility
      - mortality
      - census
      - ageing
      - family
    priority_weight: 10

  - name: "DHS Program News"
    group: "Global"
    source_type: "Signal"
    url: "https://dhsprogram.com/rss/news.cfm"
    parser: "rss"
    keywords_any:
      - survey
      - demographic
      - population
      - health
      - mortality
      - fertility
      - household
      - family planning
    priority_weight: 8

  - name: "Human Mortality Database Events"
    group: "Global"
    source_type: "Signal"
    url: "https://www.mortality.org/News/Events"
    parser: "generic_calendar"
    keywords_any:
      - mortality
      - death
      - life expectancy
      - demographic
      - population
    priority_weight: 12

  - name: "Finngen Signals"
    group: "Europe Registries"
    source_type: "Signal"
    url: "https://www.finngen.fi/en/news"
    fallback_urls:
      - "https://www.finngen.fi/en/access_results"
    parser: "html_signal_scan"
    keywords_any:
      - registry
      - population
      - cohort
      - data release
      - archive
      - decommission
      - discontinued
      - mortality
      - access
    priority_weight: 10
