settings:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  timeout: 30
  max_workers: 16
  page_workers: 4
  max_abs_days: 730

sources:
  # --- UK & SCOTLAND ---
  - name: "ONS Upcoming Releases"
    group: "UK Official"
    source_type: "Official"
    url: "https://www.ons.gov.uk/releasecalendar?release-type=type-upcoming"
    parser: "ons_release_calendar"
    keywords_any: ["population", "census", "migration", "fertility", "mortality", "health", "demographic", "labour"]
    priority_weight: 22

  - name: "NRS Scotland"
    group: "UK Official"
    source_type: "Official"
    url: "https://www.nrscotland.gov.uk/statistics-and-data/statistics/forthcoming-publications"
    parser: "generic_calendar"
    keywords_any: ["population", "birth", "death", "migration", "household", "life expectancy", "names", "surnames"]
    priority_weight: 20

  # --- USA ---
  - name: "US Census Releases"
    group: "US Official"
    source_type: "Official"
    url: "https://www.census.gov/data/what-is-data-census-gov/upcoming-releases.html"
    parser: "census_upcoming"
    keywords_any: ["population", "census", "migration", "household", "microdata", "demographic", "survey"]
    priority_weight: 18

  - name: "NCHS / CDC Health Data"
    group: "US Official"
    source_type: "Official"
    url: "https://www.cdc.gov/nchs/rss/nchs.xml"
    parser: "rss"
    keywords_any: ["health", "mortality", "birth", "vital statistics", "survey", "dataset"]
    priority_weight: 20

  # --- ASIA ---
  - name: "Statistics Japan (e-Stat)"
    group: "Japan Official"
    source_type: "Official"
    url: "https://www.stat.go.jp/english/info/calendar/index.html"
    fallback_urls: ["https://www.stat.go.jp/english/info/news/"]
    parser: "generic_calendar"
    keywords_any: ["population", "demographic", "birth", "death", "migration", "household"]
    priority_weight: 20

  - name: "KOSTAT South Korea"
    group: "Korea Official"
    source_type: "Official"
    url: "https://kostat.go.kr/anse/"
    parser: "generic_calendar"
    keywords_any: ["population", "demographic", "birth", "death", "migration", "household", "fertility"]
    priority_weight: 20

  - name: "NBS China"
    group: "China Official"
    source_type: "Official"
    url: "http://www.stats.gov.cn/english/PressRelease/"
    parser: "generic_calendar"
    keywords_any: ["population", "demographic", "birth", "death", "migration", "household", "yearbook"]
    priority_weight: 20

  - name: "MOSPI India"
    group: "India Official"
    source_type: "Official"
    url: "https://mospi.gov.in/"
    parser: "generic_calendar"
    keywords_any: ["survey", "statistics", "data", "release", "health", "demographic", "employment", "PLFS", "NSS"]
    priority_weight: 20

  - name: "Census of India"
    group: "India Official"
    source_type: "Official"
    url: "https://censusindia.gov.in/census.website/"
    parser: "generic_calendar"
    keywords_any: ["census", "population", "demographic", "data", "release", "SRS", "sample registration"]
    priority_weight: 20

  # --- EUROSTAT & EU REGISTRIES ---
  - name: "Eurostat Dataset Updates"
    group: "EU Official"
    source_type: "Official"
    url: "https://ec.europa.eu/eurostat/api/dissemination/catalogue/rss/en/statistics-update.rss"
    parser: "rss"
    max_items: 100
    keywords_any: ["population", "demography", "migration", "asylum", "fertility", "mortality", "health", "census"]
    priority_weight: 20

  - name: "Eurostat Release Calendar"
    group: "EU Official"
    source_type: "Official"
    url: "https://ec.europa.eu/eurostat/cache/RELEASE_CALENDAR/calendar_EN.ics"
    parser: "ics_calendar"
    keywords_any: ["population", "demography", "migration", "asylum", "fertility", "mortality", "health", "census", "marriages", "divorces", "life expectancy"]
    priority_weight: 22

  - name: "FinData News"
    group: "EU Registries"
    source_type: "Registry"
    url: "https://findata.fi/en/feed/"
    parser: "rss"
    keywords_any: ["data", "health", "social", "register", "permit", "release", "dataset", "cohort"]
    priority_weight: 18

  - name: "CBS Netherlands"
    group: "EU Official"
    source_type: "Official"
    url: "https://www.cbs.nl/en-gb/publication-calendar"
    parser: "generic_calendar"
    keywords_any: ["population", "migration", "asylum", "births", "mortality", "health", "housing", "labour"]
    priority_weight: 14

  - name: "Statistics Norway"
    group: "EU Official"
    source_type: "Official"
    url: "https://www.ssb.no/en/rss"
    parser: "rss"
    keywords_any: ["population", "migration", "births", "deaths", "health", "labour", "asylum"]
    priority_weight: 12

  - name: "Statistics Sweden"
    group: "EU Official"
    source_type: "Official"
    url: "https://www.scb.se/en/finding-statistics/publishing-calendar/"
    parser: "generic_calendar"
    keywords_any: ["population", "migration", "birth", "death", "fertility", "health", "asylum"]
    priority_weight: 12

  # --- BIOBANKS ---
  - name: "UK Biobank News"
    group: "Biobanks"
    source_type: "Registry"
    url: "https://www.ukbiobank.ac.uk/explore-your-participation/news-and-events"
    parser: "generic_calendar"
    keywords_any: ["data release", "cohort", "genomic", "health data", "update", "researchers", "dataset"]
    priority_weight: 25

  - name: "All of Us Research Program"
    group: "Biobanks"
    source_type: "Registry"
    url: "https://allofus.nih.gov/news-events-and-media/announcements"
    parser: "generic_calendar"
    keywords_any: ["data", "researcher workbench", "release", "cohort", "genomic", "health"]
    priority_weight: 20

  - name: "Our Future Health UK"
    group: "Biobanks"
    source_type: "Registry"
    url: "https://ourfuturehealth.org.uk/news/"
    parser: "generic_calendar"
    keywords_any: ["data", "release", "research", "cohort", "blood", "health"]
    priority_weight: 20

  # --- GLOBAL & UN ---
  - name: "UN Population Division"
    group: "Global / UN"
    source_type: "Signal"
    url: "https://www.un.org/development/desa/pd/feed"
    parser: "rss"
    keywords_any: ["population", "demographic", "migration", "fertility", "mortality", "projections", "prospects"]
    priority_weight: 20

  - name: "DHS Program News"
    group: "Global / UN"
    source_type: "Signal"
    url: "https://dhsprogram.com/rss/news.cfm"
    parser: "rss"
    max_items: 50
    keywords_any: ["survey", "demographic", "population", "health", "mortality", "dataset", "available"]
    priority_weight: 15

  - name: "Human Mortality Database"
    group: "Global / UN"
    source_type: "Registry"
    url: "https://www.mortality.org/News/Events"
    parser: "generic_calendar"
    keywords_any: ["mortality", "death", "life expectancy", "update", "data"]
    priority_weight: 18

  # --- MEDIA SIGNALS ---
  - name: "GDELT Demography & Cohorts"
    group: "Media Signals"
    source_type: "Media"
    url: "https://api.gdeltproject.org/api/v2/doc/doc"
    parser: "gdelt"
    gdelt_query: "(population OR demography OR census OR fertility OR mortality OR migration OR biobank OR cohort)"
    gdelt_timespan: "1week"
    max_items: 60
    keywords_any: ["population", "demography", "census", "fertility", "mortality", "migration", "biobank", "cohort"]
    priority_weight: 5
