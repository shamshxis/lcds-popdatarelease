settings:
  history_days: 365
  lookback_days: 180
  lookahead_days: 180
  request_timeout_seconds: 15
  user_agent: "Mozilla/5.0 (compatible; GlobalPopWatch/2.3; +https://github.com/)"
  discovery_max_links_per_source: 30
  discovery_keywords:
    - population
    - migration
    - demographic
    - fertility
    - mortality
    - census
    - labour
    - household
    - births
    - deaths
    - asylum
    - projections
    - estimates
    - pyramid
    - age
  trusted_domains:
    - ons.gov.uk
    - ec.europa.eu
    - census.gov
    - dhsprogram.com
    - population.un.org
    - populationpyramid.net
    - scb.se
    - ssb.no
    - dst.dk
    - stat.fi

sources:
  - id: ons_migration_calendar
    name: ONS Migration Releases
    region: UK
    country: United Kingdom
    source_type: release_calendar
    parser: ons_release_calendar
    url: https://www.ons.gov.uk/releasecalendar
    keywords: migration
    themes: [migration, population]
    priority: 10

  - id: ons_population_calendar
    name: ONS Population Releases
    region: UK
    country: United Kingdom
    source_type: release_calendar
    parser: ons_release_calendar
    url: https://www.ons.gov.uk/releasecalendar
    keywords: population
    themes: [population, births, deaths]
    priority: 10

  - id: eurostat_release_calendar
    name: Eurostat Release Calendar
    region: Europe
    country: European Union
    source_type: release_calendar
    parser: eurostat_release_calendar
    url: https://ec.europa.eu/eurostat/news/release-calendar
    themes: [population, migration, labour, household, asylum]
    priority: 10

  - id: us_census_upcoming
    name: US Census Upcoming Releases
    region: North America
    country: United States
    source_type: release_calendar
    parser: census_upcoming_releases
    url: https://www.census.gov/data/what-is-data-census-gov/upcoming-releases.html
    themes: [population, census, migration, household, labour]
    priority: 10

  - id: dhs_data_portal
    name: DHS Data Portal
    region: Global
    country: Multi-country
    source_type: dataset_access
    parser: simple_page
    url: https://dhsprogram.com/data/
    themes: [fertility, mortality, health, population, survey]
    priority: 9

  - id: dhs_available_datasets
    name: DHS Available Datasets
    region: Global
    country: Multi-country
    source_type: dataset_access
    parser: dhs_available_datasets
    url: https://dhsprogram.com/data/available-datasets.cfm
    themes: [fertility, mortality, health, population, survey]
    priority: 9

  - id: un_wpp
    name: UN World Population Prospects
    region: Global
    country: Global
    source_type: dataset_page
    parser: simple_page
    url: https://population.un.org/wpp/
    themes: [population, projections, pyramid]
    priority: 9

  - id: population_pyramid
    name: PopulationPyramid.net
    region: Global
    country: Global
    source_type: dataset_page
    parser: simple_page
    url: https://www.populationpyramid.net/
    themes: [population, pyramid]
    priority: 7

  - id: scb_population_statistics
    name: Statistics Sweden Population Statistics
    region: Scandinavia
    country: Sweden
    source_type: dataset_page
    parser: simple_page
    url: https://www.scb.se/en/finding-statistics/statistics-by-subject-area/population-and-living-conditions/population-composition-and-development/population-statistics/
    themes: [population, fertility, migration]
    priority: 8

  - id: ssb_population
    name: Statistics Norway Population
    region: Scandinavia
    country: Norway
    source_type: dataset_page
    parser: simple_page
    url: https://www.ssb.no/en/befolkning/folketall/statistikk/befolkning
    themes: [population, births, deaths, migration]
    priority: 8

  - id: dst_scheduled_releases
    name: Statistics Denmark Scheduled Releases
    region: Scandinavia
    country: Denmark
    source_type: release_calendar
    parser: simple_page
    url: https://www.dst.dk/en/Statistik/planlagte
    themes: [population, labour, migration, household]
    priority: 8

  - id: statfi_population
    name: Statistics Finland Population
    region: Scandinavia
    country: Finland
    source_type: dataset_page
    parser: simple_page
    url: https://stat.fi/en/statistics/vamuu
    themes: [population, births, deaths, migration]
    priority: 8

    settings:
  history_days: 365
  lookahead_days: 365
  user_agent: "Mozilla/5.0 (ResearchBot/LCDS-3.0)"

sources:
  # --- UK (ONS) ---
  - name: "ONS: Births in England & Wales"
    country: "UK"
    url: "https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/livebirths/bulletins/birthsummarytablesenglandandwales/2022"
    parser: "ons_html"
    priority: "High"

  - name: "ONS: Deaths Registered Weekly"
    country: "UK"
    url: "https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/bulletins/deathsregisteredweeklyinenglandandwales/latest"
    parser: "ons_html"
    priority: "High"

  - name: "ONS: Long-Term Migration"
    country: "UK"
    url: "https://www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/internationalmigration/bulletins/longterminternationalmigrationprovisional/latest"
    parser: "ons_html"
    priority: "High"

  # --- EUROPE (EUROSTAT) ---
  - name: "Eurostat: Excess Mortality"
    country: "EU"
    url: "https://ec.europa.eu/eurostat/statistics-explained/index.php?title=Excess_mortality_statistics"
    parser: "eurostat_html"
    priority: "Medium"

  - name: "Eurostat: Population Projections"
    country: "EU"
    url: "https://ec.europa.eu/eurostat/web/population-demography/population-projections"
    parser: "generic_date"
    priority: "Medium"

  # --- USA (CENSUS & CDC) ---
  - name: "US Census: Projections"
    country: "USA"
    url: "https://www.census.gov/data/tables/2023/demo/popproj/2023-summary-tables.html"
    parser: "generic_date"
    priority: "Medium"

  - name: "CDC Wonder: Provisional Deaths"
    country: "USA"
    url: "https://wonder.cdc.gov/mcd-icd10-provisional.html"
    parser: "generic_date"
    priority: "Medium"

  # --- GLOBAL ACADEMIC (LCDS Core) ---
  - name: "Human Mortality Database (HMD)"
    country: "Global"
    url: "https://www.mortality.org/News/Events"
    parser: "generic_date"
    priority: "High"

  - name: "Human Fertility Database (HFD)"
    country: "Global"
    url: "https://www.humanfertility.org/Home/News"
    parser: "generic_date"
    priority: "High"

  # --- SCANDINAVIA (High Quality Registers) ---
  - name: "Statistics Sweden: Population"
    country: "Sweden"
    url: "https://www.scb.se/en/finding-statistics/statistics-by-subject-area/population-and-living-conditions/population-composition-and-development/population-statistics/"
    parser: "generic_date"
    priority: "Low"

  - name: "Statice: Overview"
    country: "Iceland"
    url: "https://www.statice.is/statistics/population/inhabitants/overview/"
    parser: "generic_date"
    priority: "Low"

# --- MEDIA / RSS FEEDS (For "News Capture") ---
feeds:
  - name: "ONS Release Calendar"
    url: "https://www.ons.gov.uk/releasecalendar/rss"
  - name: "Eurostat News"
    url: "https://ec.europa.eu/eurostat/cache/RSS/rss.xml"
  - name: "DHS Program News"
    url: "https://dhsprogram.com/rss/news.cfm"
  - name: "Retraction Watch (Data Quality)"
    url: "https://retractionwatch.com/feed/"
